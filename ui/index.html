<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Washes Nearby</title>
  <link rel="stylesheet" href="wash-module-ui.css" />
</head>
<body class="wm-body">
  <div id="wm-app"></div>
  <script src="wash-module-sdk.js"></script>
  <script>
    WashModule.createPage({
      moduleId: 'washesnearby',
      accent: '#0ea5e9',
      refreshInterval: 12000,
      title: { ru: 'Автомойки рядом', en: 'Washes Nearby' },
      subtitle: {
        ru: 'Создаёт мойки на сайте «Автомойки рядом» и синхронизирует цены, занятость постов, новости и акции.',
        en: 'Creates washes on Washes Nearby and syncs prices, post occupancy, news and promotions.',
      },
      settingsHtml: `
        <div class="wm-field wm-field--full">
          <label class="wm-field-label" for="owner_api_token">${WashModule.t({ ru: 'Owner API токен', en: 'Owner API token' })}</label>
          <input class="wm-input" id="owner_api_token" type="password" name="owner_api_token" autocomplete="off" placeholder="Bearer token" />
          <span class="wm-field-hint">${WashModule.t({ ru: 'Кабинет владельца → API. Оставьте пустым, чтобы не менять сохранённый токен.', en: 'Owner cabinet → API. Leave empty to keep the saved token.' })}</span>
        </div>
        <div class="wm-field wm-field--full">
          <label class="wm-field-label" for="maps_api_base">${WashModule.t({ ru: 'URL API', en: 'API URL' })}</label>
          <input class="wm-input" id="maps_api_base" type="text" name="maps_api_base" placeholder="https://xn----7sb0aeimehj.xn--p1ai" />
        </div>
        <div class="wm-field">
          <label class="wm-field-label" for="default_latitude">${WashModule.t({ ru: 'Широта', en: 'Latitude' })}</label>
          <input class="wm-input" id="default_latitude" type="number" step="any" name="default_latitude" />
        </div>
        <div class="wm-field">
          <label class="wm-field-label" for="default_longitude">${WashModule.t({ ru: 'Долгота', en: 'Longitude' })}</label>
          <input class="wm-input" id="default_longitude" type="number" step="any" name="default_longitude" />
        </div>
        <div class="wm-field">
          <label class="wm-field-label" for="default_city">${WashModule.t({ ru: 'Город', en: 'City' })}</label>
          <input class="wm-input" id="default_city" type="text" name="default_city" />
        </div>
        <div class="wm-field">
          <label class="wm-field-label" for="poll_interval">${WashModule.t({ ru: 'Интервал (сек)', en: 'Interval (sec)' })}</label>
          <input class="wm-input" id="poll_interval" type="number" name="poll_interval" min="60" max="3600" />
          <span class="wm-field-hint">${WashModule.t({ ru: 'Телеметрия на сайте — не чаще 1 раза в минуту.', en: 'Site telemetry accepts at most once per minute.' })}</span>
        </div>
        <div class="wm-field">
          <label class="wm-field-label" for="news_limit">${WashModule.t({ ru: 'Лимит новостей/акций', en: 'News/promo limit' })}</label>
          <input class="wm-input" id="news_limit" type="number" name="news_limit" min="1" max="50" />
        </div>
        <div class="wm-field">
          <label class="wm-field-label" for="wash_id">${WashModule.t({ ru: 'Только мойка CRM', en: 'Only CRM wash' })}</label>
          <input class="wm-input" id="wash_id" type="text" name="wash_id" placeholder="id или пусто = все" />
        </div>
        <div class="wm-field">
          <label class="wm-field-label" for="wash_type">${WashModule.t({ ru: 'Тип мойки', en: 'Wash type' })}</label>
          <input class="wm-input" id="wash_type" type="text" name="wash_type" placeholder="self_service" />
        </div>
        <div class="wm-field wm-field--full">
          <label class="wm-field-label" for="wash_mapping">${WashModule.t({ ru: 'Сопоставление CRM→сайт (JSON)', en: 'CRM→site mapping (JSON)' })}</label>
          <textarea class="wm-input" id="wash_mapping" name="wash_mapping" rows="3" placeholder='{"crmWashId": 12}'></textarea>
          <span class="wm-field-hint">${WashModule.t({ ru: 'Если мойка уже есть на сайте — укажите id. Иначе модуль создаст новую и запомнит связь в data/wash_mapping.json.', en: 'If the wash already exists on the site, set its id. Otherwise the module creates one and stores the link in data/wash_mapping.json.' })}</span>
        </div>
        <div class="wm-field wm-field--full">
          <label class="wm-field-label" for="wash_coords">${WashModule.t({ ru: 'Координаты по мойкам (JSON)', en: 'Per-wash coordinates (JSON)' })}</label>
          <textarea class="wm-input" id="wash_coords" name="wash_coords" rows="3" placeholder='{"crmWashId":{"lat":55.16,"lng":61.4,"city":"Челябинск"}}'></textarea>
        </div>`,
      collectSettings(form) {
        const token = String(form.owner_api_token.value || '').trim();
        const settings = {
          maps_api_base: String(form.maps_api_base.value || '').trim(),
          default_latitude: Number(form.default_latitude.value),
          default_longitude: Number(form.default_longitude.value),
          default_city: String(form.default_city.value || '').trim(),
          poll_interval: Number(form.poll_interval.value),
          news_limit: Number(form.news_limit.value),
          wash_id: String(form.wash_id.value || '').trim(),
          wash_type: String(form.wash_type.value || '').trim() || 'self_service',
          wash_mapping: String(form.wash_mapping.value || '').trim(),
          wash_coords: String(form.wash_coords.value || '').trim(),
        };
        if (token) settings.owner_api_token = token;
        return settings;
      },
      applySettings(settings, form) {
        form.maps_api_base.value = settings.maps_api_base ?? 'https://xn----7sb0aeimehj.xn--p1ai';
        form.default_latitude.value = settings.default_latitude ?? 55.1644;
        form.default_longitude.value = settings.default_longitude ?? 61.4368;
        form.default_city.value = settings.default_city ?? '';
        form.poll_interval.value = settings.poll_interval ?? 60;
        form.news_limit.value = settings.news_limit ?? 5;
        form.wash_id.value = settings.wash_id ?? '';
        form.wash_type.value = settings.wash_type ?? 'self_service';
        form.wash_mapping.value = settings.wash_mapping ?? '';
        form.wash_coords.value = settings.wash_coords ?? '';
        if (settings.owner_api_token) {
          form.owner_api_token.value = '';
          form.owner_api_token.placeholder = WashModule.t({ ru: '•••••••• (сохранён)', en: '•••••••• (saved)' });
        }
      },
      metrics(snap) {
        if (!snap || !snap.recordedAt) return [];
        return [
          { label: WashModule.t({ ru: 'Синхронизировано', en: 'Synced' }), value: snap.syncedThisCycle ?? 0, accent: true },
          { label: WashModule.t({ ru: 'Связок', en: 'Mapped' }), value: snap.mappedCount ?? 0 },
          { label: WashModule.t({ ru: 'Моек CRM', en: 'CRM washes' }), value: snap.crmWashCount ?? 0 },
          {
            label: WashModule.t({ ru: 'Токен', en: 'Token' }),
            value: snap.configured ? WashModule.t({ ru: 'Да', en: 'Yes' }) : WashModule.t({ ru: 'Нет', en: 'No' }),
          },
        ];
      },
      renderOverview(snap, status) {
        if (!snap || !snap.recordedAt) {
          const running = status && (status.activeRunStatus === 'running' || (status.state && status.state.status === 'running'));
          const hint = running
            ? WashModule.t({ ru: 'Ожидание первой синхронизации…', en: 'Waiting for the first sync…' })
            : WashModule.t({ ru: 'Нет статуса — запустите модуль.', en: 'No status yet — start the module.' });
          return `<div class="wm-empty">${WashModule.escapeHtml(hint)}</div>`;
        }
        const rows = Array.isArray(snap.results) ? snap.results : [];
        const listHtml = rows.length
          ? `<ul class="wm-list">${rows.map((r) =>
              `<li><strong>${WashModule.escapeHtml(String(r.name || r.crmWashId || '—'))}</strong>
               <span class="wm-field-hint">CRM ${WashModule.escapeHtml(String(r.crmWashId))} → сайт ${WashModule.escapeHtml(String(r.remoteWashId))}
               · режимы ${WashModule.escapeHtml(String(r.modes ?? 0))} · посты ${WashModule.escapeHtml(String(r.posts ?? 0))}</span></li>`
            ).join('')}</ul>`
          : `<p class="wm-field-hint">${WashModule.t({ ru: 'Пока нет результатов.', en: 'No results yet.' })}</p>`;
        const errors = Array.isArray(snap.recentErrors) ? snap.recentErrors : [];
        const errHtml = errors.length
          ? `<ul class="wm-list">${errors.map((e) =>
              `<li><strong>${WashModule.escapeHtml(String(e.name || e.crmWashId || '—'))}</strong><br><span class="wm-field-hint">${WashModule.escapeHtml(String(e.error || ''))}</span></li>`
            ).join('')}</ul>`
          : `<p class="wm-field-hint">${WashModule.t({ ru: 'Ошибок нет.', en: 'No errors.' })}</p>`;
        return `
          <h2 class="wm-section-title">${WashModule.t({ ru: 'Мойки', en: 'Washes' })}</h2>
          ${listHtml}
          <h2 class="wm-section-title" style="margin-top:1rem">${WashModule.t({ ru: 'Ошибки', en: 'Errors' })}</h2>
          ${errHtml}
          <h2 class="wm-section-title" style="margin-top:1rem">${WashModule.t({ ru: 'Снимок', en: 'Snapshot' })}</h2>
          <pre class="wm-code">${WashModule.escapeHtml(JSON.stringify(snap, null, 2))}</pre>`;
      },
    });
  </script>
</body>
</html>
